<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="lib/FontAwesome/css/all.min.css">
    <link rel="shortcut icon" href="img/Logo.jpg">
    <title>Bienvenido a Trovalo App</title>

</head>
<body>
    <h1 id="titulo-principal-index">Directorio para la Contratación de Servicios</h1>
    <br><br>
    <h2 class="subt-index">Bienvenido a Trovalo App</h2>
    <div class="seccion-principal">
        <h2 class="subt-index">¿Cómo deseas ingresar?</h2>

        <a id="btn-cliente" class="btn-principal" href="view/inicio-sesion.html">
            <i class="fa-solid fa-circle-user"></i>
            Soy Cliente
        </a>
        
        <a id="btn-prestador" class="btn-principal" href="view/inicio-sesion.html">
            <i class="fa-solid fa-briefcase"></i>
            Soy Prestador de Servicio
        </a>
</div>
</body>

<!--Tenemeos que asignar un Rol para saber cual vista mostrar-->
<script>
    document.getElementById('btn-cliente').addEventListener('click', function() {
        this.href = 'view/inicio-sesion.html';
        localStorage.setItem('rol', 'cliente');
    });

    document.getElementById('btn-prestador').addEventListener('click', function() {
        this.href = 'view/inicio-sesion.html';
        localStorage.setItem('rol', 'prestador');
    });
</script>


</html>
