<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/registro-cliente.css">
    <link rel="stylesheet" href="../lib/FontAwesome/css/all.min.css">
    <link rel="shortcut icon" href="../img/Logo.jpg">
    <title>Registro</title>
</head>
<body>

    <section class="seccion-registro">

        <h2>Registro de Cliente</h2>

        <form id="form-registro">

            <p class="titulo-paso">Paso 1: Datos personales</p>

            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre">
            <label for="documento">Documento de identidad</label>
            <input type="text" id="documento">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo">
            <label for="celular">Celular</label>
            <input type="tel" id="celular">

            <p class="titulo-paso">Paso 2: Seguridad</p>

            <label for="password">Contraseña</label>
            <input type="password" id="password">
            <label for="confirmar-password">Confirmar contraseña</label>
            <input type="password" id="confirmar-password">

            <p class="titulo-paso">Paso 3: Ubicación</p>

            <label for="ciudad">Ciudad</label>
            <select id="ciudad">
                <option value="">Selecciona una ciudad</option>
            </select>
            <label for="sector">Sector</label>
            <select id="sector">
                <option value="">Selecciona un sector</option>
            </select>
            <label>Su documento de Identidad</label>
            <div class="caja-documento">
                <i class="fa-solid fa-upload"></i>
                <p>Click para subir documento</p>
                <input type="file" id="documento-identidad">
            </div>

            <a href="inicio-sesion.html">
                <button type="button">Registrarse</button>
            </a>

        </form>
    </section>

</body>
</html>
