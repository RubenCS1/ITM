    <section class="seccion-notificaciones">

            </div>

        </div>

        <div class="tarjeta-notificacion no-leida">
            <div class="icono-notificacion">
                <i class="fa-solid fa-file-lines"></i>

            </div>
            <span class="punto-no-leido"></span>
        </div>

        <div class="tarjeta-notificacion">
            <div class="icono-notificacion leida">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="info-notificacion">
                <p class="texto-notificacion">Tu perfil fue actualizado exitosamente</p>
