<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/inicio-sesion.css">
    <link rel="stylesheet" href="../lib/FontAwesome/css/all.min.css">
    <link rel="shortcut icon" href="../img/Logo.jpg">
    <title>Inicia Sesión</title>
</head>
<body>

    <section class="seccion-iniciar-sesion">
        <h2>Inicia Sesión</h2>
        <form id="form-inicio-sesion">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email">
            <label for="password">Contraseña</label>
            <input type="password" id="password">
            <a href="#" class="resetPassword">¿Olvidaste tu contraseña?</a>
            <a href="main-cliente.html">
                <button type="submit">Ingresar</button>
            </a>
            <br>
            <p class="registrarse">¿Primera vez aquí? <a href="registro-cliente.html">Regístrate</a></p>
        </form>

    </section>
    
    <!--Dirigir según el rol escogido-->
    <script>
    const rol = localStorage.getItem('rol');

    document.getElementById('form-inicio-sesion').addEventListener('submit', function(e) {
        e.preventDefault();

        if (rol === 'cliente') {
            window.location.href = 'main-cliente.html';
        } else {
            window.location.href = 'main-prestador.html';
        }
    });
</script>

</body>
</html>
